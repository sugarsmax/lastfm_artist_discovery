<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Old Favorites — Last.fm Discoveries</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="container">
            <nav class="site-nav">
                <a href="index.html" class="nav-link">&#9654; Discoveries</a>
                <a href="classical.html" class="nav-link">&#9836; Classical Spotter</a>
                <a href="familiar.html" class="nav-link nav-link-active">&#9733; Old Favorites</a>
            </nav>
            <h1 class="familiar-title">Old Favorites</h1>
            <p>Discovery artists you've already built real history with — not in the top 1000, but with 50+ scrobbles.</p>
            <div id="stats" class="stats-bar">
                <!-- Stats injected here -->
            </div>
        </div>
    </header>

    <main class="container">
        <div class="controls">
            <input type="text" id="searchInput" placeholder="Search artists or tracks...">
            <select id="sortSelect">
                <option value="playcount">Most Scrobbles</option>
                <option value="last_seen">Recently Played</option>
                <option value="artist_asc">Artist (A-Z)</option>
            </select>
        </div>

        <div id="familiarGrid" class="grid">
            <div class="loading">Loading catalog...</div>
        </div>
    </main>

    <footer>
        <div class="container">
            <p id="lastUpdated">Last updated: ...</p>
            <p>Artists from the discovery catalog with 50+ total scrobbles — your middle-tier favorites.</p>
        </div>
    </footer>

    <script src="js/familiar.js"></script>
</body>
</html>
